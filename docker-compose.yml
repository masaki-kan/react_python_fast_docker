# ============================================================
# Docker Compose 設定ファイル
# - frontend: React + TypeScript (Vite)  → http://localhost:3000
# - backend:  Python3 + FastAPI          → http://localhost:8001
# - db:       PostgreSQL 16              → localhost:5433
# - Prisma Studio                        → http://localhost:5555
# ============================================================

services:

  # ----------------------------------------------------------
  # Frontend: React + TypeScript (Vite)
  # ----------------------------------------------------------
  frontend:
    build: ./frontend
    ports:
      - "3000:5173"       # ホスト:3000 → コンテナ:5173 (Vite dev server)
    volumes:
      - ./frontend:/app   # ホットリロード用にソースをマウント
      - /app/node_modules # node_modules はコンテナ内のものを使用
    depends_on:
      - backend

  # ----------------------------------------------------------
  # Backend: Python3 + FastAPI
  # ----------------------------------------------------------
  backend:
    build: ./backend
    ports:
      - "8001:8000"       # ホスト:8001 → コンテナ:8000 (uvicorn)
      - "5555:5555"       # Prisma Studio 用ポート
    volumes:
      - ./backend:/app    # ホットリロード用にソースをマウント
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/app_db
    depends_on:
      db:
        condition: service_healthy  # DB が起動してから backend を開始

  # ----------------------------------------------------------
  # DB: PostgreSQL 16
  # ----------------------------------------------------------
  db:
    image: postgres:16-alpine
    ports:
      - "5433:5432"       # ホスト:5433 → コンテナ:5432
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: app_db
    volumes:
      - postgres_data:/var/lib/postgresql/data  # データ永続化
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

# 名前付きボリューム（DB データ永続化用）
volumes:
  postgres_data:
